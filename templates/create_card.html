<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Entrada - DevDiary</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <a href="/" class="logo-link">
            <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="logo" width="40" height="40">
            <span class="logo-text">DevDiary</span>
        </a>
    </header>
    <main>
        <form action="{{ url_for('form_create') }}" method="post" class="creat-form">
            <div class="form__card">
                <h2>Nueva Entrada</h2>
                
                <div class="form__inputs">
                    <label for="title">
                        <input class="form__input" type="text" name="title" id="title" placeholder="Título de la entrada" required>
                    </label>
                    <label for="subtitle">
                        <input class="form__input" type="text" name="subtitle" id="subtitle" placeholder="Subtítulo breve" required>
                    </label>
                </div>
                
                <label for="text" class="full-width">
                    <textarea class="form__text" name="text" id="text" required placeholder="Escribe tus apuntes, pensamientos o código aquí..."></textarea>
                </label>
                
                <button type="submit" class="form__button">Guardar Entrada</button>
            </div>
        </form>
    </main>
</body>
</html>
